<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌈 句子小達人 — 中文重組遊戲 Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        :root {
            --purple:#764ba2; --blue:#667eea; --green:#43e97b; --cyan:#38f9d7;
            --orange:#f7971e; --yellow:#ffd200; --pink:#f5576c; --magenta:#f093fb;
            --bg-dark: #0f0c29;
        }

        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action: manipulation;}
        body{font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;background:var(--bg-dark);color: #fff;}

        /* 背景特效 */
        .bg-gradient{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);overflow:hidden;}
        .bg-gradient::before{content:'';position:absolute;inset:-50%;background:conic-gradient(from 0deg at 50% 50%,rgba(102,126,234,.15),rgba(118,75,162,.15),rgba(245,87,108,.1),rgba(240,147,251,.1),rgba(67,233,123,.1),rgba(102,126,234,.15));animation:rotateBg 30s linear infinite;}
        @keyframes rotateBg{to{transform:rotate(360deg);}}

        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;animation:orbF 10s ease-in-out infinite alternate;}
        .orb-1{width:350px;height:350px;background:#667eea;top:5%;left:5%;}
        .orb-2{width:300px;height:300px;background:#f093fb;bottom:10%;right:5%;animation-delay:2s;}
        @keyframes orbF{0%{transform:translate(0,0) scale(1);}100%{transform:translate(50px,50px) scale(1.2);}}

        .stars-layer{position:absolute;inset:0;}
        .tiny-star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite alternate;}
        @keyframes twinkle{0%{opacity:.2;}100%{opacity:1;}}

        /* 遊戲容器 */
        .game-wrapper{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:15px;min-height:100vh;display: flex;flex-direction: column;}

        /* 標題區 */
        .header{text-align:center;margin-bottom:15px;}
        .header h1{font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,#ffd200,#f7971e,#f5576c,#f093fb,#667eea,#43e97b);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gTxt 5s ease infinite;letter-spacing:2px;}
        @keyframes gTxt{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
        .header .subtitle{font-size:1.1rem;color:rgba(255,255,255,.6);margin-top:5px;}

        /* 吉祥物 */
        .mascot{position:fixed;bottom:20px;right:20px;z-index:50;font-size:3.5rem;cursor:pointer;filter:drop-shadow(0 5px 15px rgba(0,0,0,0.5));transition:transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .mascot:hover{transform:scale(1.2) rotate(10deg);}
        .mascot-speech{position:fixed;bottom:90px;right:20px;z-index:51;background:#fff;border-radius:20px 20px 5px 20px;padding:12px 20px;font-size:1rem;font-weight:700;color:#302b63;box-shadow:0 10px 30px rgba(0,0,0,0.3);max-width:220px;opacity:0;transform:translateY(20px);transition:all 0.4s;pointer-events:none;}
        .mascot-speech.show{opacity:1;transform:translateY(0);}

        /* 狀態列 */
        .status-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.08);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:12px 24px;margin-bottom:15px;gap:15px;flex-wrap: wrap;}
        .status-item{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:700;}
        .streak-badge{background:linear-gradient(135deg,#f7971e,#ffd200);color:#7a4e00;font-size:0.85rem;padding:4px 12px;border-radius:20px;font-weight:900;display:none;}
        .streak-badge.show{display:inline-block;animation:popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .progress-container{width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 5px;}
        .progress-bar{height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);}

        /* 分類選擇 */
        .cat-selector{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:15px;}
        .cat-pill{padding:8px 18px;border-radius:25px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.3s;border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);background:rgba(255,255,255,.05);}
        .cat-pill.active{color:#fff;border-color:transparent;box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .cat-pill.active[data-cat="all"]{background:linear-gradient(135deg,#667eea,#764ba2);}
        .cat-pill.active[data-cat="animal"]{background:linear-gradient(135deg,#f7971e,#ffd200);}
        .cat-pill.active[data-cat="family"]{background:linear-gradient(135deg,#f093fb,#f5576c);}
        .cat-pill.active[data-cat="life"]{background:linear-gradient(135deg,#43e97b,#38f9d7);}
        .cat-pill.active[data-cat="nature"]{background:linear-gradient(135deg,#4facfe,#00f2fe);}
        .cat-pill.active[data-cat="fun"]{background:linear-gradient(135deg,#fa709a,#fee140);}

        /* 遊戲卡片 */
        .card{background:rgba(255,255,255,.07);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:25px;margin-bottom:20px;position:relative;box-shadow: 0 20px 50px rgba(0,0,0,0.3);}
        .question-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap: wrap;}
        .tag{padding:4px 12px;border-radius:15px;font-size:0.8rem;font-weight:800;text-transform: uppercase;}
        .tag-cat{background: rgba(255,255,255,0.15); color: #fff;}
        .tag-diff{background: rgba(67, 233, 123, 0.2); color: var(--green);}

        /* 放置區 */
        .drop-zone{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;min-height:90px;border:2px dashed rgba(255,255,255,.2);border-radius:24px;padding:20px;margin-bottom:20px;transition: all 0.3s;}
        .slot{min-width:130px;height:65px;border:2px dashed rgba(255,255,255,.2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;background:rgba(255,255,255,.03);cursor:pointer;position:relative;transition: all 0.3s;}
        .slot.filled{border:2px solid var(--blue);background:rgba(102,126,234,.15);animation:popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .slot.wrong{border:2px solid var(--pink) !important;background:rgba(245,87,108,.15) !important;animation:shake 0.5s ease-in-out;}
        .slot-num{position:absolute;top:-10px;left:-10px;width:24px;height:24px;background:var(--blue);border-radius:50%;font-size:0.7rem;display:flex;align-items:center;justify-content:center;}

        /* 單詞池 */
        .word-pool{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:20px;}
        .word-tile{padding:12px 24px;font-size:1.7rem;font-weight:900;border-radius:20px;cursor:pointer;transition:all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);border:2px solid rgba(255,255,255,0.1);color: #fff;text-shadow: 0 2px 4px rgba(0,0,0,0.2);}
        .word-tile:hover{transform:translateY(-5px) scale(1.05);box-shadow: 0 10px 20px rgba(0,0,0,0.25);}
        .word-tile.used{opacity:0.1;pointer-events:none;transform:scale(0.9);}

        /* 按鈕 */
        .btn-group{display:flex;gap:15px;justify-content:center;margin-top:25px;}
        .btn{padding:12px 30px;font-size:1.1rem;font-weight:800;border:none;border-radius:18px;cursor:pointer;transition:all 0.3s;display: flex;align-items: center;gap:8px;}
        .btn-check{background:linear-gradient(135deg,var(--green),var(--cyan));color:#1a5c3a;}
        .btn-reset{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);}
        .btn:active{transform:scale(0.95);}

        /* 回饋彈窗 */
        .overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s;}
        .overlay.show{opacity:1;pointer-events:auto;}
        .modal{background:#1e1c3c;border-radius:35px;padding:40px;text-align:center;max-width:500px;width:90%;transform:scale(0.8);transition:transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .overlay.show .modal{transform:scale(1);}
        .modal-emoji{font-size:5rem;margin-bottom:15px;}
        .modal-title{font-size:2rem;font-weight:900;margin-bottom:10px;}
        .modal-ans{background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;margin:20px 0;font-size:1.8rem;font-weight:700;color:var(--yellow);}

        /* 動畫 */
        @keyframes popIn{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
        .shake{animation: shake 0.5s ease-in-out;}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}

        @media(max-width:600px){
            .header h1{font-size:2rem;}
            .word-tile{font-size:1.4rem;padding:10px 18px;}
            .slot{min-width:100px;height:55px;font-size:1.3rem;}
            .modal-ans{font-size:1.4rem;}
        }
    </style>
</head>
<body>

<div class="bg-gradient" id="bgLayer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="mascot" id="mascot" onclick="talkMascot()">🐻</div>
<div class="mascot-speech" id="mascotSpeech">加油哦！</div>

<div class="game-wrapper">
    <div class="header">
        <h1>✨ 句子小達人 Pro</h1>
        <p class="subtitle">將詞語拖放到正確位置，組成完整的句子！</p>
    </div>

    <div class="cat-selector" id="catSelector">
        <div class="cat-pill active" data-cat="all">🌈 全部</div>
        <div class="cat-pill" data-cat="animal">🐾 動物</div>
        <div class="cat-pill" data-cat="family">👨‍👩‍👧 家庭</div>
        <div class="cat-pill" data-cat="life">📚 生活</div>
        <div class="cat-pill" data-cat="nature">🌿 自然</div>
        <div class="cat-pill" data-cat="fun">🎈 玩樂</div>
    </div>

    <div class="status-bar">
        <div class="status-item">第 <span id="curIdx">1</span> / <span id="totalIdx">10</span> 題</div>
        <div class="status-item">⭐ <span id="score">0</span> 分</div>
        <div class="streak-badge" id="streakBadge">🔥 <span id="streakCount">0</span> 連對</div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="card" id="gameCard">
        <div class="question-header">
            <span class="tag tag-cat" id="qCat">🐾 動物</span>
            <span class="tag tag-diff" id="qDiff">簡單</span>
            <span style="margin-left:auto; cursor:pointer;" onclick="showHint()">💡 提示</span>
        </div>
        
        <div class="drop-zone" id="dropZone"></div>
        
        <div style="text-align:center; color:rgba(255,255,255,0.4); font-size:0.9rem;">👇 點擊下方詞語填入空格</div>
        <div class="word-pool" id="wordPool"></div>

        <div class="btn-group">
            <button class="btn btn-reset" onclick="resetSlots()">🔄 重設</button>
            <button class="btn btn-check" onclick="checkAnswer()">✅ 檢查答案</button>
        </div>
    </div>

    <div id="finalView" style="display:none; text-align:center; padding:40px;">
        <div style="font-size:6rem;">🏆</div>
        <h2 style="font-size:2.5rem; margin-bottom:20px;">挑戰完成！</h2>
        <div id="finalStats" style="font-size:1.3rem; line-height:2; margin-bottom:30px;"></div>
        <button class="btn btn-check" style="margin:0 auto; font-size:1.5rem;" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<div class="overlay" id="modalOverlay">
    <div class="modal" id="feedbackModal">
        <div class="modal-emoji" id="mEmoji">🎉</div>
        <div class="modal-title" id="mTitle">答對了！</div>
        <div style="color:rgba(255,255,255,0.6);">正確句子：</div>
        <div class="modal-ans" id="mAns"></div>
        <div id="mBonus" style="color:var(--yellow); font-weight:900; margin-bottom:15px;"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-reset" id="mSpeakBtn">🔊 重聽</button>
            <button class="btn btn-check" id="mNextBtn">下一題 👉</button>
        </div>
    </div>
</div>

<script>
/**
 * 題庫擴充至 100 句 (書面語)
 */
const DATA = [
    // 動物 (20)
    {words:["小貓","在","沙發上","睡覺"], cat:"animal", label:"🐾 動物", diff:"簡單", hint:"小動物在哪裡休息？"},
    {words:["小狗","在","草地上","奔跑"], cat:"animal", label:"🐾 動物", diff:"簡單", hint:"狗狗喜歡在哪裡玩？"},
    {words:["金魚","在","魚缸裡","游來游去"], cat:"animal", label:"🐾 動物", diff:"簡單", hint:"小魚在哪裡活動？"},
    {words:["小鳥","在","枝頭上","唱歌"], cat:"animal", label:"🐾 動物", diff:"簡單", hint:"誰在樹上叫？"},
    {words:["蝴蝶","在","花叢中","飛舞"], cat:"animal", label:"🐾 動物", diff:"簡單", hint:"彩色的昆蟲在做什麼？"},
    {words:["企鵝","住在","冰天雪地","的南極"], cat:"animal", label:"🐾 動物", diff:"中等", hint:"這種鳥住在哪裡？"},
    {words:["袋鼠","的肚子裡","有一個","小袋鼠"], cat:"animal", label:"🐾 動物", diff:"中等", hint:"跳跳澳洲動物的特徵？"},
    {words:["烏龜","爬行","的速度","非常緩慢"], cat:"animal", label:"🐾 動物", diff:"中等", hint:"牠走得快嗎？"},
    {words:["長頸鹿","有","一條","長長的","脖子"], cat:"animal", label:"🐾 動物", diff:"中等", hint:"牠最高的特徵？"},
    {words:["大象","用","長鼻子","吸水洗澡"], cat:"animal", label:"🐾 動物", diff:"中等", hint:"象如何洗澡？"},
    {words:["蜜蜂","忙著","在花間","採集","花粉"], cat:"animal", label:"🐾 動物", diff:"挑戰", hint:"小昆蟲在工作？"},
    {words:["青蛙","在","荷葉上","捕捉","害蟲"], cat:"animal", label:"🐾 動物", diff:"挑戰", hint:"田園小英雄在做什麼？"},
    {words:["兔子","最喜歡","吃","蘿蔔"], cat:"animal", label:"🐾 動物", diff:"簡單", hint:"長耳朵吃什麼？"},
    {words:["孔雀","展開","了","美麗的","羽毛"], cat:"animal", label:"🐾 動物", diff:"挑戰", hint:"最漂亮的開屏？"},
    {words:["猴子","在","樹林裡","盪來盪去"], cat:"animal", label:"🐾 動物", diff:"簡單", hint:"靈活的動物在森林？"},
    {words:["老鷹","在","高空中","盤旋"], cat:"animal", label:"🐾 動物", diff:"中等", hint:"天空霸主在做什麼？"},
    {words:["螃蟹","在","沙灘上","橫著走路"], cat:"animal", label:"🐾 動物", diff:"中等", hint:"海邊生物走路方式？"},
    {words:["貓頭鷹","在","黑夜裡","捕捉","獵物"], cat:"animal", label:"🐾 動物", diff:"挑戰", hint:"晚上不睡覺的鳥？"},
    {words:["松鼠","在","樹洞裡","儲存","橡果"], cat:"animal", label:"🐾 動物", diff:"挑戰", hint:"小動物如何過冬？"},
    {words:["蠶寶寶","喜歡","吃","新鮮的","桑葉"], cat:"animal", label:"🐾 動物", diff:"挑戰", hint:"牠長大會變蛾？"},

    // 家庭 (20)
    {words:["媽媽","煮了","豐富的","晚餐"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"簡單", hint:"誰在廚房忙碌？"},
    {words:["爸爸","正在","書房","辛勤工作"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"簡單", hint:"爸爸在做什麼？"},
    {words:["爺爺","在","公園","練習","太極"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"挑戰", hint:"長輩在運動？"},
    {words:["奶奶","為我","織了","一件毛衣"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"溫暖的衣服是誰做的？"},
    {words:["哥哥","在","房間","溫習","功課"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"學生在家做什麼？"},
    {words:["姐姐","彈奏","動聽的","鋼琴曲"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"優美的音樂誰發出的？"},
    {words:["妹妹","把","玩具","收拾","乾淨"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"好孩子要玩完後？"},
    {words:["弟弟","在","地上","畫圖畫"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"簡單", hint:"小孩在創作？"},
    {words:["我們","一家人","去","郊外","野餐"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"全家出動？"},
    {words:["爸爸","教我","如何","騎單車"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"新的技能是誰教的？"},
    {words:["媽媽","溫柔地","說","床邊故事"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"睡覺前聽什麼？"},
    {words:["爺爺","喜歡","在","早晨散步"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"簡單", hint:"老人家早起做什麼？"},
    {words:["奶奶","做出","美味的","傳統年糕"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"挑戰", hint:"過年時誰做點心？"},
    {words:["我們","合作","打掃","整個客廳"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"挑戰", hint:"大掃除？"},
    {words:["爸爸","修理","家中的","壞電器"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"壞了的東西誰處理？"},
    {words:["媽媽","在","花園","種植","玫瑰"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"漂亮的植物誰種的？"},
    {words:["姐姐","帶我","去","公共圖書館"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"簡單", hint:"去借書？"},
    {words:["哥哥","陪我","在","球場","踢球"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"簡單", hint:"戶外運動？"},
    {words:["全家人","圍坐","在一起","吃年夜飯"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"挑戰", hint:"最重要的晚餐？"},
    {words:["我們","給","媽媽","慶祝生日"], cat:"family", label:"👨‍👩‍👧 家庭", diff:"中等", hint:"慶祝活動？"},

    // 生活 (20)
    {words:["我","每天","早睡","早起"], cat:"life", label:"📚 生活", diff:"簡單", hint:"良好的作息習慣？"},
    {words:["老師","在","課室","教導","學生"], cat:"life", label:"📚 生活", diff:"中等", hint:"學校裡發生什麼？"},
    {words:["我們要","保持","雙手","清潔衛生"], cat:"life", label:"📚 生活", diff:"簡單", hint:"防疫小貼士？"},
    {words:["飯前","必須","洗手","才能","用餐"], cat:"life", label:"📚 生活", diff:"挑戰", hint:"衛生習慣？"},

/**
 * 遊戲邏輯與狀態
 */
let gameState = {
    category: 'all',
    questions: [],
    currentIdx: 0,
    score: 0,
    streak: 0,
    bestStreak: 0,
    slots: [],
    usedIndices: [],
    shuffledWords: []
};

// 語音初始化
let synth = window.speechSynthesis;
let cantoVoice = null;

function loadVoices() {
    let voices = synth.getVoices();
    cantoVoice = voices.find(v => v.lang === 'zh-HK' || v.lang.includes('HK')) || 
                 voices.find(v => v.lang.includes('zh')) || null;
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, rate = 0.85) {
    if (!synth) return;
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (cantoVoice) utter.voice = cantoVoice;
    utter.lang = 'zh-HK';
    utter.rate = rate;
    utter.pitch = 1;
    synth.speak(utter);
}

// 核心初始化
function initGame(cat = 'all') {
    gameState.category = cat;
    let pool = cat === 'all' ? [...DATA] : DATA.filter(d => d.cat === cat);
    // 隨機選10題
    gameState.questions = pool.sort(() => Math.random() - 0.5).slice(0, 10);
    gameState.currentIdx = 0;
    gameState.score = 0;
    gameState.streak = 0;
    
    document.getElementById('finalView').style.display = 'none';
    document.getElementById('gameCard').style.display = 'block';
    document.getElementById('catSelector').style.display = 'flex';
    document.getElementById('totalIdx').innerText = gameState.questions.length;

    loadQuestion();
}

function loadQuestion() {
    const q = gameState.questions[gameState.currentIdx];
    gameState.shuffledWords = [...q.words].sort(() => Math.random() - 0.5);
    gameState.slots = Array(q.words.length).fill(null);
    gameState.usedIndices = [];

    document.getElementById('curIdx').innerText = gameState.currentIdx + 1;
    document.getElementById('score').innerText = gameState.score;
    document.getElementById('qCat').innerText = q.label;
    document.getElementById('qDiff').innerText = q.diff;
    document.getElementById('progressBar').style.width = `${(gameState.currentIdx / gameState.questions.length) * 100}%`;

    renderGame();
}

function renderGame() {
    const dropZone = document.getElementById('dropZone');
    dropZone.innerHTML = '';
    gameState.slots.forEach((val, i) => {
        const div = document.createElement('div');
        div.className = `slot ${val ? 'filled' : ''}`;
        div.innerHTML = `<span class="slot-num">${i+1}</span>${val || ''}`;
        div.onclick = () => removeWord(i);
        dropZone.appendChild(div);
    });

    const pool = document.getElementById('wordPool');
    pool.innerHTML = '';
    gameState.shuffledWords.forEach((word, i) => {
        const div = document.createElement('div');
        const isUsed = gameState.usedIndices.includes(i);
        div.className = `word-tile ${isUsed ? 'used' : ''}`;
        // 賦予顏色
        const colors = ['#f7971e', '#43e97b', '#667eea', '#f5576c', '#4facfe', '#ffd200'];
        div.style.background = isUsed ? 'rgba(255,255,255,0.05)' : colors[i % colors.length];
        div.innerText = word;
        div.onclick = () => isUsed ? null : fillWord(i);
        pool.appendChild(div);
    });
}

function fillWord(wordIdx) {
    const emptySlot = gameState.slots.indexOf(null);
    if (emptySlot !== -1) {
        gameState.slots[emptySlot] = gameState.shuffledWords[wordIdx];
        gameState.usedIndices.push(wordIdx);
        speak(gameState.shuffledWords[wordIdx], 1.1);
        renderGame();
    }
}

function removeWord(slotIdx) {
    const word = gameState.slots[slotIdx];
    if (word) {
        const poolIdx = gameState.shuffledWords.indexOf(word);
        // 如果池中有重複詞，要找一個被標記為used的
        const usedIdx = gameState.usedIndices.find(idx => gameState.shuffledWords[idx] === word);
        gameState.usedIndices = gameState.usedIndices.filter(idx => idx !== usedIdx);
        gameState.slots[slotIdx] = null;
        renderGame();
    }
}

function resetSlots() {
    gameState.slots = Array(gameState.slots.length).fill(null);
    gameState.usedIndices = [];
    renderGame();
    document.getElementById('gameCard').classList.add('shake');
    setTimeout(() => document.getElementById('gameCard').classList.remove('shake'), 500);
}

function checkAnswer() {
    if (gameState.slots.includes(null)) {
        talkMascot("要把空格填滿哦！");
        document.getElementById('gameCard').classList.add('shake');
        setTimeout(() => document.getElementById('gameCard').classList.remove('shake'), 500);
        return;
    }

    const q = gameState.questions[gameState.currentIdx];
    const userSentence = gameState.slots.join('');
    const correctSentence = q.words.join('');
    const isCorrect = userSentence === correctSentence;

    const overlay = document.getElementById('modalOverlay');
    const modal = document.getElementById('feedbackModal');
    const mEmoji = document.getElementById('mEmoji');
    const mTitle = document.getElementById('mTitle');
    const mAns = document.getElementById('mAns');
    const mBonus = document.getElementById('mBonus');
    const mSpeakBtn = document.getElementById('mSpeakBtn');
    const mNextBtn = document.getElementById('mNextBtn');

    if (isCorrect) {
        gameState.streak++;
        if (gameState.streak > gameState.bestStreak) gameState.bestStreak = gameState.streak;
        
        let bonus = gameState.streak >= 3 ? 5 : 0;
        let points = 10 + bonus;
        gameState.score += points;

        mEmoji.innerText = "🎉";
        mTitle.innerText = "太棒了，答對了！";
        mTitle.style.color = "var(--green)";
        mAns.innerText = correctSentence;
        mBonus.innerText = bonus > 0 ? `🔥 連續對了 ${gameState.streak} 題！額外 +${bonus} 分` : `獲得 ${points} 分`;
        
        mSpeakBtn.innerText = "🔊 重聽";
        mSpeakBtn.onclick = () => speak(correctSentence);
        
        mNextBtn.innerText = "下一題 👉";
        mNextBtn.onclick = () => {
            overlay.classList.remove('show');
            nextQuestion();
        };

        speak(correctSentence);
    } else {
        gameState.streak = 0;
        mEmoji.innerText = "🤔";
        mTitle.innerText = "差一點點！";
        mTitle.style.color = "var(--orange)";
        mAns.innerHTML = "<span style='font-size:1.2rem; color:#fff;'>有幾個詞語放錯位置了，<br>要再挑戰一次嗎？</span>";
        mBonus.innerText = "找出錯誤並修正它們！";

        mSpeakBtn.innerText = "🔄 再試一次";
        mSpeakBtn.onclick = () => {
            overlay.classList.remove('show');
            retryWrongWords();
        };

        mNextBtn.innerText = "👀 看答案";
        mNextBtn.onclick = () => {
            mTitle.innerText = "正確答案是：";
            mTitle.style.color = "var(--pink)";
            mAns.innerText = correctSentence;
            mBonus.innerText = "別灰心，下次一定能答對！";
            speak(`正確句子是：${correctSentence}`);

            mSpeakBtn.innerText = "🔊 重聽";
            mSpeakBtn.onclick = () => speak(correctSentence);

            mNextBtn.innerText = "下一題 👉";
            mNextBtn.onclick = () => {
                overlay.classList.remove('show');
                nextQuestion();
            };
        };
        
        speak("有幾個詞語放錯位置了，要再挑戰一次嗎？");
    }

    const badge = document.getElementById('streakBadge');
    if (gameState.streak >= 2) {
        badge.classList.add('show');
        document.getElementById('streakCount').innerText = gameState.streak;
    } else {
        badge.classList.remove('show');
    }

    overlay.classList.add('show');
}

function retryWrongWords() {
    const q = gameState.questions[gameState.currentIdx];
    const dropZone = document.getElementById('dropZone');
    const slotElements = dropZone.children;

    let hasWrong = false;
    for (let i = 0; i < gameState.slots.length; i++) {
        if (gameState.slots[i] !== q.words[i]) {
            slotElements[i].classList.add('wrong');
            hasWrong = true;
        }
    }

    // 延遲一段時間讓玩家看到哪些錯了，然後將它們退回單詞池
    if (hasWrong) {
        setTimeout(() => {
            for (let i = 0; i < gameState.slots.length; i++) {
                if (gameState.slots[i] !== q.words[i]) {
                    removeWord(i);
                }
            }
        }, 600);
    }
}

function nextQuestion() {
    gameState.currentIdx++;
    if (gameState.currentIdx < gameState.questions.length) {
        loadQuestion();
    } else {
        showFinal();
    }
}

function showHint() {
    const q = gameState.questions[gameState.currentIdx];
    talkMascot(q.hint);
    speak(q.hint);
}

function showFinal() {
    document.getElementById('gameCard').style.display = 'none';
    document.getElementById('catSelector').style.display = 'none';
    const finalView = document.getElementById('finalView');
    finalView.style.display = 'block';
    
    document.getElementById('finalStats').innerHTML = `
        <div style="font-weight:900; color:var(--yellow); font-size:2rem;">${gameState.score} 分</div>
        最高連續對題數：${gameState.bestStreak}<br>
        正確率：${(gameState.score / (gameState.questions.length * 10) * 100).toFixed(0)}%
    `;
    speak("恭喜你完成挑戰！你真厲害！");
}

function talkMascot(msg) {
    const speech = document.getElementById('mascotSpeech');
    if (!msg) {
        const msgs = ["你好啊！我是句子小達人！", "今天想練習哪一個分類？", "加油，你一定可以做到的！", "按提示可以幫到你哦！"];
        msg = msgs[Math.floor(Math.random() * msgs.length)];
    }
    speech.innerText = msg;
    speech.classList.add('show');
    setTimeout(() => speech.classList.remove('show'), 4000);
}

// 星星特效
function createStars() {
    const bg = document.getElementById('bgLayer');
    for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'tiny-star';
        star.style.top = `${Math.random() * 100}%`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.animationDelay = `${Math.random() * 3}s`;
        bg.appendChild(star);
    }
}

// 分類切換
document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.onclick = () => {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        initGame(pill.dataset.cat);
    };
});

window.onload = () => {
    createStars();
    initGame();
};

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 句子小達人 — 中文重組遊戲</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        :root {
            --purple:#764ba2; --blue:#667eea; --green:#43e97b; --cyan:#38f9d7;
            --orange:#f7971e; --yellow:#ffd200; --pink:#f5576c; --magenta:#f093fb;
        }

        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}

        body{font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;background:#0f0c29;}

        /* ===== BG ===== */
        .bg-gradient{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);overflow:hidden;}
        .bg-gradient::before{content:'';position:absolute;inset:-50%;background:conic-gradient(from 0deg at 50% 50%,rgba(102,126,234,.12),rgba(118,75,162,.12),rgba(245,87,108,.08),rgba(240,147,251,.08),rgba(67,233,123,.08),rgba(102,126,234,.12));animation:rotateBg 25s linear infinite;}
        @keyframes rotateBg{to{transform:rotate(360deg);}}

        .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;animation:orbF 8s ease-in-out infinite alternate;}
        .orb-1{width:300px;height:300px;background:#667eea;top:8%;left:8%;animation-duration:11s;}
        .orb-2{width:250px;height:250px;background:#f093fb;top:55%;right:4%;animation-duration:9s;animation-delay:2s;}
        .orb-3{width:200px;height:200px;background:#43e97b;bottom:8%;left:28%;animation-duration:13s;animation-delay:4s;}
        .orb-4{width:180px;height:180px;background:#ffd200;top:28%;right:22%;animation-duration:10s;animation-delay:1s;}
        @keyframes orbF{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,-40px) scale(1.15);}}

        .stars-layer{position:absolute;inset:0;}
        .tiny-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite alternate;}
        @keyframes twinkle{0%{opacity:.15;transform:scale(.7);}100%{opacity:1;transform:scale(1.3);}}

        .emoji-bubble{position:absolute;font-size:2rem;opacity:.12;animation:bubUp linear infinite;pointer-events:none;}
        @keyframes bubUp{0%{transform:translateY(100vh) rotate(0) scale(.5);opacity:0;}8%{opacity:.15;}92%{opacity:.1;}100%{transform:translateY(-10vh) rotate(360deg) scale(1.2);opacity:0;}}

        /* ===== WRAPPER ===== */
        .game-wrapper{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:12px 14px 36px;min-height:100vh;}

        /* ===== HEADER ===== */
        .header{text-align:center;margin-bottom:10px;position:relative;}
        .header-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:90px;background:radial-gradient(ellipse,rgba(102,126,234,.35),transparent 70%);pointer-events:none;}
        .header h1{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,#ffd200,#f7971e,#f5576c,#f093fb,#667eea,#43e97b);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gTxt 4s ease infinite;letter-spacing:3px;position:relative;}
        @keyframes gTxt{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
        .header .subtitle{font-size:1rem;color:rgba(255,255,255,.55);margin-top:2px;}

        /* ===== MASCOT ===== */
        .mascot{position:fixed;bottom:18px;right:18px;z-index:50;font-size:3.2rem;animation:mBounce 2s ease-in-out infinite;cursor:pointer;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));transition:transform .2s;}
        .mascot:hover{transform:scale(1.2);}
        @keyframes mBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
        .mascot-speech{position:fixed;bottom:80px;right:14px;z-index:50;background:#fff;border-radius:16px 16px 4px 16px;padding:10px 16px;font-size:.95rem;font-weight:700;color:#764ba2;box-shadow:0 8px 30px rgba(0,0,0,.2);max-width:210px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
        .mascot-speech.show{opacity:1;transform:translateY(0);}

        /* ===== STATUS BAR ===== */
        .status-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 20px;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
        .status-item{display:flex;align-items:center;gap:5px;color:#fff;font-size:1rem;font-weight:700;}
        .status-item .icon{font-size:1.3rem;}
        .streak-badge{background:linear-gradient(135deg,#f7971e,#ffd200);color:#7a4e00;font-size:.78rem;padding:2px 10px;border-radius:20px;font-weight:900;display:none;animation:popIn .3s cubic-bezier(.4,2,.6,1);}
        .streak-badge.show{display:inline-flex;align-items:center;gap:3px;}
        .progress-track{flex:1 1 100%;height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin-top:3px;}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan),var(--blue));background-size:200% 100%;animation:shimmer 2s linear infinite;border-radius:5px;transition:width .6s cubic-bezier(.4,2,.6,1);width:0%;}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

        /* ===== CATEGORY SELECTOR ===== */
        .cat-selector{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
        .cat-pill{padding:6px 16px;border-radius:30px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .25s;border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);background:rgba(255,255,255,.05);}
        .cat-pill:hover{background:rgba(255,255,255,.1);color:#fff;}
        .cat-pill.active{color:#fff;border-color:transparent;}
        .cat-pill.active[data-cat="all"]{background:linear-gradient(135deg,#667eea,#764ba2);}
        .cat-pill.active[data-cat="animal"]{background:linear-gradient(135deg,#f7971e,#ffd200);}
        .cat-pill.active[data-cat="family"]{background:linear-gradient(135deg,#f093fb,#f5576c);}
        .cat-pill.active[data-cat="life"]{background:linear-gradient(135deg,#43e97b,#38f9d7);}
        .cat-pill.active[data-cat="nature"]{background:linear-gradient(135deg,#4facfe,#00f2fe);}
        .cat-pill.active[data-cat="fun"]{background:linear-gradient(135deg,#fa709a,#fee140);}

        /* ===== CARD ===== */
        .card{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:24px 20px 20px;margin-bottom:14px;position:relative;overflow:hidden;}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--orange),var(--yellow),var(--green),var(--cyan),var(--blue),var(--purple),var(--pink),var(--magenta),var(--orange));background-size:300% 100%;animation:rainbowBar 3s linear infinite;}
        @keyframes rainbowBar{from{background-position:0 0;}to{background-position:300% 0;}}
        .card::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(102,126,234,.07),transparent 50%);pointer-events:none;}
        .question-section{position:relative;z-index:1;}

        /* ===== QUESTION LABEL ===== */
        .question-label{font-size:1.1rem;color:rgba(255,255,255,.8);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
        .cat-tag{font-size:.82rem;padding:3px 12px;border-radius:20px;font-weight:800;color:#fff;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
        .cat-tag[data-c="animal"]{background:linear-gradient(135deg,#f7971e,#ffd200);color:#7a4e00;}
        .cat-tag[data-c="family"]{background:linear-gradient(135deg,#f093fb,#f5576c);}
        .cat-tag[data-c="life"]{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a5c3a;}
        .cat-tag[data-c="nature"]{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#0a3d6b;}
        .cat-tag[data-c="fun"]{background:linear-gradient(135deg,#fa709a,#fee140);color:#7a2040;}

        .diff-tag{font-size:.75rem;padding:2px 10px;border-radius:20px;font-weight:800;}
        .diff-easy{background:rgba(67,233,123,.18);color:#43e97b;border:1px solid rgba(67,233,123,.25);}
        .diff-medium{background:rgba(255,210,0,.18);color:#ffd200;border:1px solid rgba(255,210,0,.25);}
        .diff-hard{background:rgba(245,87,108,.18);color:#f5576c;border:1px solid rgba(245,87,108,.25);}

        .hint-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:.82rem;padding:4px 14px;border-radius:20px;font-weight:700;margin-left:auto;cursor:pointer;transition:all .2s;}
        .hint-badge:hover{background:rgba(255,255,255,.15);transform:scale(1.06);}

        /* ===== DROP ZONE ===== */
        .drop-zone{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;min-height:76px;border:2px dashed rgba(255,255,255,.13);border-radius:20px;padding:14px 10px;margin-bottom:14px;transition:all .3s;position:relative;z-index:1;}
        .drop-zone.all-filled{border-color:rgba(67,233,123,.35);background:rgba(67,233,123,.03);}
        .slot{width:144px;height:66px;border:2px dashed rgba(255,255,255,.18);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;font-weight:900;color:rgba(255,255,255,.12);background:rgba(255,255,255,.025);transition:all .3s;position:relative;cursor:default;}
        .slot .slot-num{position:absolute;top:-10px;left:-10px;width:24px;height:24px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:.72rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,.3);}
        .slot.filled{border-style:solid;border-color:rgba(102,126,234,.45);background:rgba(102,126,234,.1);color:#fff;cursor:pointer;animation:popIn .3s cubic-bezier(.4,2,.6,1);text-shadow:0 2px 8px rgba(0,0,0,.2);}
        .slot.filled:hover{transform:scale(1.06);border-color:rgba(245,87,108,.5);background:rgba(245,87,108,.12);box-shadow:0 4px 20px rgba(245,87,108,.15);}
        .slot.correct-anim{border-color:rgba(67,233,123,.7)!important;background:rgba(67,233,123,.12)!important;animation:cPulse .6s ease;}
        .slot.wrong-anim{border-color:rgba(245,87,108,.7)!important;background:rgba(245,87,108,.12)!important;animation:shake .5s ease;}
        @keyframes cPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

        /* ===== WORD POOL ===== */
        .word-pool-label{font-size:.9rem;color:rgba(255,255,255,.4);font-weight:700;margin-bottom:8px;text-align:center;position:relative;z-index:1;}
        .word-pool{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;min-height:68px;padding:6px 0;position:relative;z-index:1;}
        .word-tile{display:flex;align-items:center;justify-content:center;padding:11px 24px;font-size:1.8rem;font-weight:900;border-radius:18px;cursor:grab;transition:all .25s cubic-bezier(.4,2,.6,1);color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.2);position:relative;animation:popIn .4s cubic-bezier(.4,2,.6,1) both;border:2px solid rgba(255,255,255,.18);overflow:hidden;}
        .word-tile::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 30%,rgba(255,255,255,.18),transparent 60%);pointer-events:none;}
        .word-tile:active{cursor:grabbing;transform:scale(.95);}
        .word-tile:hover{transform:translateY(-5px) scale(1.07);box-shadow:0 12px 30px rgba(0,0,0,.28);}
        .word-tile.used{opacity:.13;pointer-events:none;transform:scale(.85);filter:grayscale(1);}
        .word-tile.color-0{background:linear-gradient(135deg,#f7971e,#ffd200);}
        .word-tile.color-1{background:linear-gradient(135deg,#43e97b,#38f9d7);}
        .word-tile.color-2{background:linear-gradient(135deg,#667eea,#764ba2);}
        .word-tile.color-3{background:linear-gradient(135deg,#f093fb,#f5576c);}
        .word-tile.color-4{background:linear-gradient(135deg,#4facfe,#00f2fe);}
        .word-tile.color-5{background:linear-gradient(135deg,#fa709a,#fee140);}
        @keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}

        /* ===== SOUND WAVE ===== */
        .sound-wave{display:inline-flex;align-items:center;gap:3px;margin-left:8px;height:18px;opacity:0;transition:opacity .3s;}
        .sound-wave.active{opacity:1;}
        .sound-wave span{display:block;width:3px;background:#4facfe;border-radius:2px;animation:sBar .6s ease-in-out infinite alternate;}
        .sound-wave span:nth-child(1){height:8px;animation-delay:0s;}
        .sound-wave span:nth-child(2){height:14px;animation-delay:.1s;}
        .sound-wave span:nth-child(3){height:10px;animation-delay:.2s;}
        .sound-wave span:nth-child(4){height:16px;animation-delay:.3s;}
        .sound-wave span:nth-child(5){height:6px;animation-delay:.15s;}
        @keyframes sBar{0%{height:4px;}100%{height:18px;}}

        /* ===== BUTTONS ===== */
        .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;position:relative;z-index:1;}
        .btn{padding:11px 28px;font-size:1.1rem;font-weight:900;border:none;border-radius:16px;cursor:pointer;transition:all .25s;font-family:'Noto Sans TC',sans-serif;letter-spacing:1px;position:relative;overflow:hidden;}
        .btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 30%,rgba(255,255,255,.18),transparent 60%);pointer-events:none;}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,.2);}
        .btn:active{transform:scale(.97);}
        .btn-check{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a5c3a;}
        .btn-reset{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65);}
        .btn-reset:hover{background:rgba(255,255,255,.14);color:#fff;}
        .btn-next{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
        .btn-restart{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;font-size:1.3rem;padding:16px 48px;}

        .speak-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;font-size:.95rem;font-weight:900;border:none;border-radius:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;box-shadow:0 4px 15px rgba(79,172,254,.25);}
        .speak-btn:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 8px 25px rgba(79,172,254,.35);}
        .speak-btn:active{transform:scale(.97);}
        .speak-btn.speaking{animation:sPulse .6s ease infinite;}
        @keyframes sPulse{0%,100%{box-shadow:0 4px 15px rgba(79,172,254,.25);}50%{box-shadow:0 4px 30px rgba(79,172,254,.55);}}

        /* ===== FEEDBACK ===== */
        .feedback{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .4s;}
        .feedback.show{opacity:1;pointer-events:auto;}
        .feedback-bg{position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);}
        .feedback-box{position:relative;background:rgba(30,28,60,.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:32px 40px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4);animation:bounceIn .5s cubic-bezier(.4,2,.6,1);max-width:92vw;}
        @keyframes bounceIn{0%{transform:scale(.3) translateY(60px);opacity:0;}100%{transform:scale(1) translateY(0);opacity:1;}}
        .feedback-emoji{font-size:4.2rem;margin-bottom:6px;}
        .feedback-text{font-size:1.7rem;font-weight:900;margin-bottom:5px;}
        .feedback-sub{font-size:1.05rem;color:rgba(255,255,255,.45);margin-bottom:14px;}
        .feedback-answer{font-size:1.5rem;font-weight:900;color:#ffd200;background:rgba(255,210,0,.07);border:1px solid rgba(255,210,0,.18);padding:11px 26px;border-radius:16px;display:inline-block;margin-bottom:14px;}
        .correct .feedback-text{color:#43e97b;}
        .wrong .feedback-text{color:#f5576c;}
        .score-popup{font-size:1.05rem;font-weight:900;color:#ffd200;margin-bottom:12px;}

        /* ===== HINT ===== */
        .hint-overlay{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
        .hint-overlay.show{opacity:1;pointer-events:auto;}
        .hint-bubble{background:rgba(30,28,60,.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:30px 38px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:90vw;animation:bounceIn .4s cubic-bezier(.4,2,.6,1);}
        .hint-bubble .hint-emoji{font-size:3rem;margin-bottom:6px;}
        .hint-bubble .hint-text{font-size:1.4rem;font-weight:700;color:#ffd200;margin-bottom:14px;}

        /* ===== FINAL ===== */
        .final-screen{text-align:center;padding:30px 14px;}
        .final-screen .trophy{font-size:5.5rem;margin-bottom:6px;animation:tSpin 1s cubic-bezier(.4,2,.6,1);}
        @keyframes tSpin{0%{transform:scale(0) rotateY(180deg);}100%{transform:scale(1) rotateY(0);}}
        .final-screen h2{font-size:2.3rem;font-weight:900;background:linear-gradient(135deg,#ffd200,#f7971e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
        .final-screen .final-score{font-size:1.15rem;color:rgba(255,255,255,.6);margin-bottom:18px;line-height:1.8;}
        .star-row{display:flex;justify-content:center;gap:10px;margin-bottom:22px;}
        .star-row .star{font-size:3.2rem;animation:starPop .5s cubic-bezier(.4,2,.6,1) both;}
        .star-row .star:nth-child(2){animation-delay:.2s;}
        .star-row .star:nth-child(3){animation-delay:.4s;}
        @keyframes starPop{0%{transform:scale(0) rotate(-30deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}

        /* Stats grid */
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:360px;margin:0 auto 22px;}
        .stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 10px;text-align:center;}
        .stat-card .stat-icon{font-size:1.8rem;margin-bottom:2px;}
        .stat-card .stat-val{font-size:1.5rem;font-weight:900;color:#fff;}
        .stat-card .stat-label{font-size:.78rem;color:rgba(255,255,255,.4);font-weight:700;}

        /* ===== CONFETTI ===== */
        .confetti-container{position:fixed;inset:0;z-index:200;pointer-events:none;overflow:hidden;}
        .confetti-piece{position:absolute;top:-20px;border-radius:2px;animation:cFall linear forwards;}
        @keyframes cFall{0%{transform:translateY(0) rotate(0) scale(1);opacity:1;}100%{transform:translateY(110vh) rotate(1080deg) scale(.5);opacity:0;}}

        @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-8px);}80%{transform:translateX(8px);}}
        .shake{animation:shake .5s ease;}

        .combo-float{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.8rem;font-weight:900;color:#ffd200;text-shadow:0 0 30px rgba(255,210,0,.6);pointer-events:none;z-index:150;animation:comboA 1.2s cubic-bezier(.4,2,.6,1) forwards;}
        @keyframes comboA{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}100%{transform:translate(-50%,-80%) scale(.8);opacity:0;}}

        /* ===== RESPONSIVE ===== */
        @media(max-width:600px){
            .header h1{font-size:1.7rem;}
            .word-tile{font-size:1.4rem;padding:9px 16px;}
            .slot{width:110px;height:56px;font-size:1.35rem;}
            .feedback-box{padding:24px 16px;}
            .feedback-text{font-size:1.3rem;}
            .btn{padding:10px 20px;font-size:.98rem;}
            .mascot{font-size:2.4rem;bottom:10px;right:10px;}
            .mascot-speech{bottom:58px;right:8px;font-size:.82rem;max-width:180px;}
            .cat-pill{font-size:.78rem;padding:5px 12px;}
            .stats-grid{grid-template-columns:repeat(2,1fr);max-width:280px;}
        }
    </style>
</head>
<body>

<div class="bg-gradient">
    <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="orb orb-4"></div>
    <div class="stars-layer" id="starsLayer"></div>
</div>

<div class="mascot" id="mascot" onclick="mascotTap()">🐻</div>
<div class="mascot-speech" id="mascotSpeech"></div>

<div class="game-wrapper" id="gameWrapper">
    <div class="header">
        <div class="header-glow"></div>
        <h1>✨ 句子小達人 ✨</h1>
        <p class="subtitle">拖拖排排，砌出啱嘅句子！</p>
    </div>

    <!-- Category Selector -->
    <div class="cat-selector" id="catSelector">

/* =======================================

   ======================================= */
let cantoVoice=null;
function initSpeech(){
    if(!('speechSynthesis' in window))return;
    const load=()=>{const v=speechSynthesis.getVoices();cantoVoice=v.find(x=>x.lang==='zh-HK')||v.find(x=>x.lang.startsWith('zh-HK'))||v.find(x=>x.lang==='zh-TW')||v.find(x=>x.lang.startsWith('zh'))||null;};
    speechSynthesis.onvoiceschanged=load;load();
}
function speakCantonese(text,rate=.85,onEnd){
    if(!('speechSynthesis' in window)){if(onEnd)onEnd();return;}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang='zh-HK';if(cantoVoice)u.voice=cantoVoice;u.rate=rate;u.pitch=1.15;u.volume=1;
    const w=document.getElementById('soundWave');w.classList.add('active');
    u.onend=()=>{w.classList.remove('active');if(onEnd)onEnd();};
    u.onerror=()=>{w.classList.remove('active');if(onEnd)onEnd();};
    speechSynthesis.speak(u);
}
function speakWord(t){speakCantonese(t,.82);}
function speakSentence(arr){speakCantonese(arr.join(''),.75);}
initSpeech();

/* =======================================
   GAME STATE
   ======================================= */
const TOTAL=10;
let selectedCat='all';
let sentences=[];
let current=0,score=0,streak=0,bestStreak=0,answeredCorrectly=0;
let slots=[],usedWords=[],shuffledWords=[];

const CAT_MAP={all:"🌈 全部",animal:"🐾 動物",family:"👨‍👩‍👧 家庭",life:"📚 生活",nature:"🌿 自然",fun:"🎈 玩樂"};
const DIFF_LABELS={easy:"簡單",medium:"中等",hard:"挑戰"};
const MASCOT_MSGS=["加油呀！你得㗎！💪","慢慢諗，唔使急 😊","你好叻呀！👏","揀啱嘅詞語排好佢！","撳提示可以幫到你 💡","做得好好呀！繼續！","你係句子小達人！🌟"];

/* ===== Category Selector ===== */
function selectCat(cat){
    selectedCat=cat;
    document.querySelectorAll('.cat-pill').forEach(p=>{p.classList.toggle('active',p.dataset.cat===cat);});
    init();
}

/* ===== Init ===== */
function init(){
    let pool=selectedCat==='all'?[...ALL_SENTENCES]:ALL_SENTENCES.filter(s=>s.cat===selectedCat);
    pool.sort(()=>Math.random()-.5);
    const count=Math.min(TOTAL,pool.length);
    sentences=pool.slice(0,count);
    current=0;score=0;streak=0;bestStreak=0;answeredCorrectly=0;
    document.getElementById('totalQ').textContent=count;
    document.getElementById('finalScreen').style.display='none';
    document.getElementById('gameCard').style.display='';
    document.getElementById('statusBar').style.display='';
    document.getElementById('catSelector').style.display='';
    updateStatus();loadQuestion();
    showMascotSpeech("準備好未？開始啦！🎉");
}

function updateStatus(){
    document.getElementById('currentQ').textContent=current+1;
    document.getElementById('score').textContent=score;
    document.getElementById('progressFill').style.width=(current/sentences.length*100)+'%';
    const b=document.getElementById('streakBadge'),n=document.getElementById('streakNum');
    if(streak>=2){b.classList.add('show');n.textContent=streak;}else b.classList.remove('show');
}

/* ===== Load Question ===== */
function loadQuestion(){
    const s=sentences[current];
    shuffledWords=[...s.words].sort(()=>Math.random()-.5);
    let att=0;
    while(shuffledWords.join('')===s.words.join('')&&att<30){shuffledWords.sort(()=>Math.random()-.5);att++;}
    slots=Array(s.words.length).fill(null);
    usedWords=Array(shuffledWords.length).fill(false);

    // Category tag
    const ct=document.getElementById('catTag');
    ct.dataset.c=s.cat;ct.textContent=s.catLabel;
    // Difficulty tag
    const dt=document.getElementById('diffTag');
    dt.textContent=DIFF_LABELS[s.diff]||'簡單';
    dt.className='diff-tag diff-'+(s.diff||'easy');

    renderSlots();renderPool();updateStatus();
}

function renderSlots(){
    const z=document.getElementById('dropZone');z.innerHTML='';
    const allF=!slots.includes(null);
    z.className='drop-zone'+(allF?' all-filled':'');
    slots.forEach((w,i)=>{
        const d=document.createElement('div');d.className='slot'+(w?' filled':'');
        d.innerHTML=`<span class="slot-num">${i+1}</span><span>${w||''}</span>`;
        if(w)d.onclick=()=>{speakWord(w);removeFromSlot(i);};
        z.appendChild(d);
    });
}

function renderPool(){
    const p=document.getElementById('wordPool');p.innerHTML='';
    shuffledWords.forEach((w,i)=>{
        const d=document.createElement('div');
        d.className=`word-tile color-${i%6}`+(usedWords[i]?' used':'');
        d.textContent=w;d.style.animationDelay=(i*.08)+'s';
        if(!usedWords[i])d.onclick=()=>{speakWord(w);placeWord(i);};
        p.appendChild(d);
    });
}

/* ===== Place / Remove ===== */
function placeWord(wIdx){
    const e=slots.indexOf(null);if(e===-1)return;
    slots[e]=shuffledWords[wIdx];usedWords[wIdx]=true;
    renderSlots();renderPool();
}
function removeFromSlot(sIdx){
    const w=slots[sIdx];if(!w)return;
    for(let i=0;i<shuffledWords.length;i++){if(shuffledWords[i]===w&&usedWords[i]){usedWords[i]=false;break;}}
    slots[sIdx]=null;renderSlots();renderPool();
}
function resetCurrent(){
    slots=Array(sentences[current].words.length).fill(null);
    usedWords=Array(shuffledWords.length).fill(false);
    renderSlots();renderPool();
    document.getElementById('gameCard').classList.add('shake');
    setTimeout(()=>document.getElementById('gameCard').classList.remove('shake'),500);
}

/* ===== Check ===== */
function checkAnswer(){
    if(slots.includes(null)){
        document.getElementById('gameCard').classList.add('shake');
        setTimeout(()=>document.getElementById('gameCard').classList.remove('shake'),500);
        showMascotSpeech("要填晒所有格仔先得㗎！");return;
    }
    const correct=sentences[current].words;
    const isCorrect=slots.join('')===correct.join('');
    const slotEls=document.querySelectorAll('.slot');
    slotEls.forEach((el,i)=>{setTimeout(()=>{el.classList.add(isCorrect?'correct-anim':'wrong-anim');},i*120);});
    setTimeout(()=>{
        if(isCorrect){streak++;if(streak>bestStreak)bestStreak=streak;let bonus=streak>=3?5:0;score+=10+bonus;answeredCorrectly++;updateStatus();showConfetti();
            if(streak>=3)showCombo(`🔥 ${streak} 連對！+${10+bonus}分`);
            speakCantonese(correct.join(''),.75);
        }else{streak=0;updateStatus();setTimeout(()=>speakCantonese(correct.join(''),.75),400);}
        showFeedback(isCorrect,correct);
    },correct.length*120+300);
}

/* ===== Feedback ===== */
function showFeedback(ok,cw){
    const fb=document.getElementById('feedback'),box=document.getElementById('feedbackBox');
    const isLast=current>=sentences.length-1;const ans=cw.join('');
    const cMsgs=["太叻喇！🎉","答啱咗！勁呀！🌟","好犀利呀！👏","正確！你好醒！💪","答得啱晒！🥳"];
    const wMsgs=["唔啱呀，冇關係！😊","下次一定得！加油～💪","差啲啫，繼續努力！👍","再試多次就識㗎！🤗"];
    const msg=ok?cMsgs[Math.floor(Math.random()*cMsgs.length)]:wMsgs[Math.floor(Math.random()*wMsgs.length)];
    box.className='feedback-box '+(ok?'correct':'wrong');
    box.innerHTML=`
        <div class="feedback-emoji">${ok?'🎉':'🤗'}</div>
        <div class="feedback-text">${msg}</div>
        <div class="feedback-sub">${ok?'你答得好好呀！':'正確嘅句子係：'}</div>
        <div class="feedback-answer" style="${ok?'color:#43e97b;border-color:rgba(67,233,123,.25);background:rgba(67,233,123,.07);':''}">${ans}</div>
        ${ok&&streak>=2?`<div class="score-popup">🔥 ${streak} 連對！</div>`:''}
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
            <button class="speak-btn" onclick="speakCantonese('${ans}',.75)">🔊 再聽一次</button>
            <button class="btn btn-next" onclick="nextQuestion()">${isLast?'🏆 睇成績':'👉 下一題'}</button>
        </div>`;
    fb.classList.add('show');
}
function closeFeedback(){document.getElementById('feedback').classList.remove('show');}
function nextQuestion(){closeFeedback();current++;if(current>=sentences.length)showFinal();else loadQuestion();}

/* ===== Hint ===== */
document.getElementById('hintBtn').onclick=function(){
    const s=sentences[current];const ov=document.getElementById('hintOverlay');
    document.getElementById('hintBubble').innerHTML=`
        <div class="hint-emoji">💡</div>
        <div style="font-size:.85rem;color:rgba(255,255,255,.35);margin-bottom:6px;">${s.catLabel}</div>
        <div class="hint-text">${s.hint}</div>
        <button class="btn btn-check" onclick="closeHint()">知道啦！</button>`;
    ov.classList.add('show');speakCantonese(s.hint,.85);
};
function closeHint(){document.getElementById('hintOverlay').classList.remove('show');}

/* ===== Final ===== */
function showFinal(){
    document.getElementById('gameCard').style.display='none';
    document.getElementById('statusBar').style.display='none';
    document.getElementById('catSelector').style.display='none';
    const tot=sentences.length;const pct=answeredCorrectly/tot;
    let stars=pct>=.8?3:pct>=.5?2:1;
    let msg,emoji;
    if(pct>=.9){msg='你係真正嘅句子小達人！超級叻！';emoji='🏆';}
    else if(pct>=.7){msg='好叻呀！做得好好！繼續加油！';emoji='🌟';}
    else if(pct>=.5){msg='做得唔錯！再練多啲會更加好！';emoji='💪';}
    else{msg='冇關係，再試多次一定得㗎！';emoji='🌱';}
    const starH=Array.from({length:3},(_,i)=>`<span class="star">${i<stars?'⭐':'☆'}</span>`).join('');
    const fs=document.getElementById('finalScreen');fs.style.display='';
    fs.innerHTML=`
        <div class="trophy">${emoji}</div>
        <h2>遊戲完成！</h2>
        <div class="star-row">${starH}</div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-val">${score}</div><div class="stat-label">總得分</div></div>
            <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">${answeredCorrectly}/${tot}</div><div class="stat-label">答啱題數</div></div>
            <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-val">${bestStreak}</div><div class="stat-label">最高連對</div></div>
            <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-val">${Math.round(pct*100)}%</div><div class="stat-label">正確率</div></div>
        </div>
        <div class="final-score">${msg}</div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-restart" onclick="init()">🔄 再玩一次</button>
        </div>`;
    document.getElementById('progressFill').style.width='100%';
    showConfetti();setTimeout(showConfetti,500);setTimeout(showConfetti,1000);
    setTimeout(()=>speakCantonese(msg,.8),600);
}

/* ===== Combo ===== */
function showCombo(t){const e=document.createElement('div');e.className='combo-float';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),1400);}

/* ===== Mascot ===== */
function showMascotSpeech(t){const s=document.getElementById('mascotSpeech');s.textContent=t;s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('show'),3500);}
function mascotTap(){const m=MASCOT_MSGS[Math.floor(Math.random()*MASCOT_MSGS.length)];showMascotSpeech(m);speakCantonese(m.replace(/[💪😊👏💡🌟🎉🥳🤗]/g,''),.9);}

/* ===== Confetti ===== */
function showConfetti(){const c=document.getElementById('confettiContainer');const cols=['#f7971e','#ffd200','#43e97b','#667eea','#f5576c','#38f9d7','#f093fb','#4facfe','#fff'];for(let i=0;i<55;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'vw';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDuration=(1.5+Math.random()*2.5)+'s';p.style.animationDelay=(Math.random()*.8)+'s';p.style.width=(6+Math.random()*12)+'px';p.style.height=(6+Math.random()*12)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.opacity=.8+Math.random()*.2;c.appendChild(p);setTimeout(()=>p.remove(),4500);}}

/* ===== BG Effects ===== */
function createStars(){const l=document.getElementById('starsLayer');for(let i=0;i<55;i++){const s=document.createElement('div');s.className='tiny-star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=(Math.random()*4)+'s';s.style.animationDuration=(1.5+Math.random()*2)+'s';const sz=(2+Math.random()*3)+'px';s.style.width=sz;s.style.height=sz;l.appendChild(s);}}
function createBubbles(){const emojis=['🌟','🎈','🎵','🦋','🌸','🍎','✏️','📖','🐻','🌈','⭐','🎂','🐱','🐶','🐰','🌷','❄️','🎠','🐘','🎨'];const bg=document.querySelector('.bg-gradient');setInterval(()=>{const e=document.createElement('div');e.className='emoji-bubble';e.textContent=emojis[Math.floor(Math.random()*emojis.length)];e.style.left=Math.random()*100+'%';e.style.fontSize=(1.5+Math.random()*2)+'rem';e.style.animationDuration=(12+Math.random()*15)+'s';bg.appendChild(e);setTimeout(()=>e.remove(),27000);},3200);}

/* ===== START ===== */
createStars();createBubbles();init();
</script>
</body>
</html>
